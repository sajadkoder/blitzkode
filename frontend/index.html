<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="BlitzKode - AI Coding Assistant by Sajad">
    <title>BlitzKode</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%2310a37f' rx='12' width='100' height='100'/><text y='.9em' x='50%25' text-anchor='middle' font-size='70'>&amp;#9889;</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --surface-2: #111111;
            --border: #1a1a1a;
            --border-light: #2a2a2a;
            --text: #ffffff;
            --text-2: #888888;
            --text-3: #555555;
            --accent: #10a37f;
            --accent-hover: #1a7f5a;
            --code-bg: #0d0d0d;
            --sidebar-width: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { height: 100%; }

        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .app {
            display: flex;
            height: 100%;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 10px;
            transition: transform 0.3s ease;
            position: fixed;
            height: 100%;
            z-index: 100;
        }

        .sidebar.collapsed {
            transform: translateX(-100%);
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 99;
        }

        .sidebar-overlay.active {
            display: block;
        }

        .new-chat-btn {
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            margin-bottom: 10px;
            font-family: inherit;
            width: 100%;
        }

        .new-chat-btn:hover {
            background: var(--border);
            border-color: var(--border-light);
        }

        .new-chat-btn svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            margin-bottom: 10px;
        }

        .logo-container {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .logo-grid {
            width: 16px;
            height: 16px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 1px;
        }

        .logo-grid span {
            background: white;
            border-radius: 1px;
        }

        .logo-grid span:nth-child(5) {
            background: transparent;
        }

        .brand-name {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
        }

        .user-avatar {
            width: 28px;
            height: 28px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .user-name {
            font-size: 13px;
            color: var(--text);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .model-badge {
            font-size: 11px;
            background: var(--accent);
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 500;
            flex-shrink: 0;
        }

        /* Main */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-left: var(--sidebar-width);
            transition: margin-left 0.3s ease;
        }

        .main.expanded {
            margin-left: 0;
        }

        /* Mobile menu toggle */
        .menu-toggle {
            display: none;
            background: var(--surface);
            border: none;
            color: var(--text);
            padding: 8px;
            cursor: pointer;
            border-radius: 8px;
        }

        .menu-toggle svg {
            width: 24px;
            height: 24px;
        }

        /* Top Bar */
        .top-bar {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .model-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
        }

        .model-status {
            font-size: 12px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .model-status.offline {
            color: #ef4444;
        }

        .model-status.offline .status-dot {
            background: #ef4444;
            animation: none;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Chat */
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            max-width: 720px;
            margin: 0 auto 24px;
            animation: fadeIn 0.15s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-label {
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-2);
        }

        .message.assistant .message-label {
            color: var(--accent);
        }

        .message-content {
            line-height: 1.7;
            font-size: 15px;
            padding-left: 0;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: #1e3a2f;
            color: #e8f5f0;
            padding: 12px 16px;
            border-radius: 18px 18px 4px 18px;
            display: inline-block;
            border: 1px solid #2a4a40;
            max-width: 100%;
            word-wrap: break-word;
        }

        /* Code Blocks */
        .message-content pre {
            background: var(--code-bg);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            padding: 16px;
            margin: 14px 0;
            overflow-x: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
            width: 100%;
            max-width: 100%;
        }

        .message-content code {
            color: #e5e5e5;
        }

        .message-content p code {
            background: var(--surface-2);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
            font-family: 'JetBrains Mono', monospace;
            word-break: break-all;
        }

        .message-content p {
            margin: 8px 0;
        }

        .message-content ul, .message-content ol {
            margin: 8px 0;
            padding-left: 24px;
        }

        .message-content li {
            margin: 4px 0;
        }

        /* Input */
        .input-wrap {
            padding: 16px 20px 24px;
            background: var(--bg);
            border-top: 1px solid var(--border);
        }

        .input-container {
            max-width: 720px;
            margin: 0 auto;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            align-items: flex-end;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-container:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(16, 163, 127, 0.1);
        }

        #prompt {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            font-family: inherit;
            font-size: 15px;
            resize: none;
            min-height: 24px;
            max-height: 200px;
            line-height: 1.5;
            outline: none;
            width: 100%;
        }

        #prompt::placeholder {
            color: var(--text-3);
        }

        #send-btn {
            background: var(--accent);
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            font-family: inherit;
            flex-shrink: 0;
        }

        #send-btn:hover {
            background: var(--accent-hover);
        }

        #send-btn:active {
            transform: scale(0.98);
        }

        #send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Empty State */
        .empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .empty-logo {
            width: 72px;
            height: 72px;
            background: var(--accent);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }

        .empty-logo .logo-grid {
            width: 32px;
            height: 32px;
        }

        .empty-logo .logo-grid span {
            border-radius: 2px;
        }

        .empty h1 {
            font-size: 26px;
            font-weight: 500;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .empty p {
            color: var(--text-2);
            font-size: 14px;
            max-width: 320px;
            text-align: center;
            line-height: 1.6;
        }

        /* Loading */
        .loading {
            display: inline-flex;
            gap: 3px;
            padding: 4px;
        }

        .loading span {
            width: 4px;
            height: 4px;
            background: var(--text-3);
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite;
        }

        .loading span:nth-child(2) { animation-delay: 0.16s; }
        .loading span:nth-child(3) { animation-delay: 0.32s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); }
            40% { transform: scale(1); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .sidebar-overlay.active {
                display: block;
            }

            .main {
                margin-left: 0;
            }

            .menu-toggle {
                display: flex;
            }

            .top-bar {
                padding: 12px 16px;
            }

            .chat {
                padding: 16px;
            }

            .input-wrap {
                padding: 12px 16px 20px;
            }

            .message {
                margin-bottom: 16px;
            }

            .message-content {
                font-size: 14px;
            }

            .message.user .message-content {
                padding: 10px 14px;
            }

            .empty h1 {
                font-size: 22px;
            }

            .empty p {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
        
        <aside class="sidebar" id="sidebar">
            <button class="new-chat-btn" onclick="newChat()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 5v14M5 12h14"/>
                </svg>
                New Chat
            </button>
            <div class="sidebar-header">
                <div class="logo-container">
                    <div class="logo-grid">
                        <span></span><span></span><span></span>
                        <span></span><span></span><span></span>
                        <span></span><span></span><span></span>
                    </div>
                </div>
                <span class="brand-name">BlitzKode</span>
            </div>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">S</div>
                    <span class="user-name">Created by Sajad</span>
                    <span class="model-badge">v1.6</span>
                </div>
            </div>
        </aside>

        <main class="main" id="main">
            <div class="top-bar">
                <div class="top-bar-left">
                    <button class="menu-toggle" onclick="openSidebar()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 12h18M3 6h18M3 18h18"/>
                        </svg>
                    </button>
                    <span class="model-name">BlitzKode</span>
                </div>
                <span class="model-status" id="modelStatus"><span class="status-dot"></span> Checking</span>
            </div>
            <div class="chat" id="chat">
                <div class="empty" id="empty">
                    <div class="empty-logo">
                        <div class="logo-grid">
                            <span></span><span></span><span></span>
                            <span></span><span></span><span></span>
                            <span></span><span></span><span></span>
                        </div>
                    </div>
                    <h1>BlitzKode</h1>
                    <p>Your AI coding assistant built by Sajad. Write code, debug, and learn programming.</p>
                </div>
            </div>

            <div class="input-wrap">
                <div class="input-container">
                    <textarea id="prompt" placeholder="Message BlitzKode (Shift+Enter for new line)" rows="1"></textarea>
                    <button id="send-btn" onclick="send()">Send</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        var chat = document.getElementById('chat');
        var promptInput = document.getElementById('prompt');
        var sendBtn = document.getElementById('send-btn');
        var empty = document.getElementById('empty');
        var sidebar = document.getElementById('sidebar');
        var sidebarOverlay = document.getElementById('sidebarOverlay');
        var main = document.getElementById('main');
        var modelStatus = document.getElementById('modelStatus');

        async function refreshStatus() {
            try {
                var res = await fetch('/health');
                if (!res.ok) {
                    throw new Error('Health check failed');
                }

                var data = await res.json();
                if (data.status === 'healthy' && data.model_exists) {
                    modelStatus.classList.remove('offline');
                    modelStatus.innerHTML = '<span class="status-dot"></span> Ready';
                } else {
                    modelStatus.classList.add('offline');
                    modelStatus.innerHTML = '<span class="status-dot"></span> Model missing';
                }
            } catch (e) {
                modelStatus.classList.add('offline');
                modelStatus.innerHTML = '<span class="status-dot"></span> Unavailable';
            }
        }

        function openSidebar() {
            sidebar.classList.add('open');
            sidebarOverlay.classList.add('active');
        }

        function closeSidebar() {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('active');
        }

        function newChat() {
            chat.innerHTML = '';
            chat.appendChild(empty);
            promptInput.value = '';
            promptInput.style.height = 'auto';
            promptInput.focus();
            closeSidebar();
        }

        promptInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                send();
            }
        });

        promptInput.addEventListener('input', function() {
            promptInput.style.height = 'auto';
            promptInput.style.height = Math.min(promptInput.scrollHeight, 200) + 'px';
        });

        function escapeHtml(text) {
            if (!text) return '';
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function formatContent(text) {
            if (!text) return '';
            
            text = escapeHtml(text);
            
            text = text.replace(/^###\s*/gm, '');
            text = text.replace(/\*\*([^*]+)\*\*/g, '$1');
            text = text.replace(/^[-*]\s+/gm, '');
            text = text.replace(/^\d+\.\s+/gm, '');
            text = text.replace(/\*([^*]+)\*/g, '$1');
            text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
            
            text = text.replace(/```python\n([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
            text = text.replace(/```javascript\n([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
            text = text.replace(/```java\n([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
            text = text.replace(/```cpp\n([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
            text = text.replace(/```c\n([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
            text = text.replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            
            var paragraphs = text.split('\n\n');
            text = paragraphs.map(function(p) {
                if (p.indexOf('<pre>') === 0 || p.indexOf('<code>') === 0) return p;
                p = p.replace(/\n/g, '<br>');
                return '<p>' + p + '</p>';
            }).join('');
            
            return text;
        }

        function addMessage(role, content) {
            if (empty && empty.parentNode) {
                empty.parentNode.removeChild(empty);
            }

            var div = document.createElement('div');
            div.className = 'message ' + role;
            div.innerHTML = 
                '<div class="message-label">' + (role === 'user' ? 'You' : 'BlitzKode') + '</div>' +
                '<div class="message-content">' + formatContent(content) + '</div>';
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        var isSending = false;

        async function send() {
            if (isSending) return;
            
            var prompt = promptInput.value.trim();
            if (!prompt) return;

            isSending = true;
            addMessage('user', prompt);
            promptInput.value = '';
            promptInput.style.height = 'auto';
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<span class="loading"><span></span><span></span><span></span></span>';

            var assistantDiv = document.createElement('div');
            assistantDiv.className = 'message assistant';
            assistantDiv.innerHTML = 
                '<div class="message-label">BlitzKode</div>' +
                '<div class="message-content"><span class="loading"><span></span><span></span><span></span></span></div>';
            chat.appendChild(assistantDiv);

            try {
                var timeoutPromise = new Promise(function(_, reject) {
                    setTimeout(function() {
                        reject(new Error('Request timeout'));
                    }, 90000);
                });

                var fetchPromise = fetch('/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({prompt: prompt, temperature: 0.5, max_tokens: 256})
                });

                var res = await Promise.race([fetchPromise, timeoutPromise]);
                
                if (!res.ok) {
                    throw new Error('Server error: ' + res.status);
                }
                
                var data = await res.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }
                
                assistantDiv.querySelector('.message-content').innerHTML = formatContent(data.response);
            } catch (e) {
                assistantDiv.querySelector('.message-content').innerHTML = '<p style="color: #ef4444;">Error: ' + escapeHtml(e.message) + '</p>';
                refreshStatus();
            }

            sendBtn.disabled = false;
            sendBtn.textContent = 'Send';
            chat.scrollTop = chat.scrollHeight;
            isSending = false;
        }

        refreshStatus();
    </script>
</body>
</html>
